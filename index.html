<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambatron AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #0f172a;
            background-image: radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.5) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(17, 24, 39, 1) 0, transparent 50%);
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #chatBox::-webkit-scrollbar { width: 4px; }
        #chatBox::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="text-slate-300 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-2xl h-[85vh] glass-card rounded-[2rem] shadow-2xl flex flex-col overflow-hidden">
        <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
            <div>
                <h1 class="text-xl font-extrabold tracking-tighter text-white">NEURAL<span class="text-blue-500">MIND</span></h1>
                <p id="userDisplay" class="text-[10px] text-blue-400 font-bold uppercase tracking-widest mt-1">Guest Mode</p>
            </div>
            <div id="limitBadge" class="text-[10px] font-mono bg-white/5 border border-white/10 px-3 py-1.5 rounded-full">
                CHATS: 0/50
            </div>
        </div>

        <div id="chatBox" class="flex-1 p-6 overflow-y-auto space-y-6 flex flex-col">
            </div>

        <div class="p-6 bg-black/20">
            <div class="flex gap-3 relative">
                <input type="text" id="userInput" placeholder="Tanyakan apa saja..." 
                    class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/50 transition-all text-sm outline-none">
                <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 rounded-2xl transition-all active:scale-95 shadow-lg shadow-blue-900/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </button>
            </div>
            <div class="flex justify-between mt-4 px-2">
                <span class="text-[9px] text-slate-500 uppercase tracking-widest">Model: GPT-3.5 Unfiltered</span>
                <span id="statusIndicator" class="text-[9px] text-green-500 uppercase tracking-widest">System Ready</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
